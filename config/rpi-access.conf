; rpi-access main configuration.
; Installed to /etc/rpi-access/rpi-access.conf by setup.sh.
; Restart rpi-access.service after editing.

[network]
; Prefix for the fallback AP. Final SSID is <prefix>-<last 4 of MAC>.
ap_ssid_prefix    = rpi-access

; AP WPA2 passphrase. Empty = open AP. Must be >=8 chars if set.
ap_password       =

ap_gateway        = 192.168.4.1
ap_subnet         = 192.168.4.0/24
ap_dhcp_start     = 192.168.4.10
ap_dhcp_end       = 192.168.4.100

wifi_interface    = wlan0
scan_timeout_s    = 15
connect_timeout_s = 25
connect_retries   = 3

; nmcli connection profile name for the AP. Don't change unless you know why.
ap_connection_name = rpi-access-AP

[portal]
host             = 0.0.0.0
; Port 80 lets phone captive-portal detection trigger automatically.
port             = 80
secret_key_file  = /etc/rpi-access/secret.key

[security]
credentials_file = /etc/rpi-access/credentials.enc
key_file         = /etc/rpi-access/master.key

[logging]
level     = INFO
file      = /var/log/rpi-access/rpi-access.log
max_bytes = 1048576
backups   = 5
