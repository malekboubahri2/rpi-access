# Fallback dnsmasq configuration.
#
# Like hostapd.conf, this is NOT enabled by default — NetworkManager's
# `ipv4.method=shared` mode already runs an internal DHCP/DNS server on
# the AP interface. This file documents the equivalent manual setup so
# you can reproduce the captive-portal behaviour if you ever need to
# bypass NM (e.g. for debugging or a custom image).

# Listen only on the AP interface.
interface=wlan0
bind-interfaces
except-interface=lo

# DHCP for AP clients.
dhcp-range=192.168.4.10,192.168.4.100,255.255.255.0,12h
dhcp-option=3,192.168.4.1     # default gateway
dhcp-option=6,192.168.4.1     # DNS server (us)

# Captive-portal DNS: send every name to ourselves so any URL the phone
# tries to open is intercepted by the Flask portal.
address=/#/192.168.4.1

# Don't read /etc/resolv.conf or /etc/hosts.
no-resolv
no-hosts

# Reasonable cache.
cache-size=150
log-queries
log-dhcp
