# Fallback hostapd configuration.
#
# This file is NOT used by the default install — we drive the AP through
# NetworkManager's `nmcli` shared mode, which handles hostapd + dnsmasq
# under the hood and avoids fighting with NM for control of wlan0.
#
# Keep it here as a documented escape hatch for sites where NM's
# `802-11-wireless.mode=ap` profile is unavailable (e.g. very minimal
# images that ship only `wpa_supplicant`). See docs/troubleshooting.md
# for the manual recipe.

interface=wlan0
driver=nl80211

ssid=rpi-access-FALLBACK
hw_mode=g
channel=6
country_code=GB
ieee80211n=1
ieee80211d=1

auth_algs=1
wmm_enabled=1

# WPA2 (set wpa_passphrase below). For an open AP, remove the wpa_* lines.
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
wpa_passphrase=changeme123
