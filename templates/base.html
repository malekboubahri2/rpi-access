<!doctype html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>{% block title %}rpi-access{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/themes.css') }}" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">⚡</span>
      <span class="brand-text">rpi-access</span>
    </div>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme" type="button">
      <span class="theme-icon" data-icon="auto">A</span>
    </button>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="app-footer">
    <small>rpi-access &middot; <a href="/">Onboarding</a> &middot; <code>http://192.168.4.1</code></small>
  </footer>

  <script src="{{ url_for('static', filename='js/theme.js') }}" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
